<html>
    <head>
        <title>Maven Repo Viewer</title>
        <style>
            body {
                font-family: Arial, sans-serif;
            }
            table {
                background-color: #f9f9f9;
                border: 1px solid #ccc;
                border-collapse: collapse;
                padding: 5px;
                width: 100%;
            }
            th {
                text-align: left;
            }
            th, td {
                padding: 5px;
            }
            th:nth-child(2), td:nth-child(2) {
                text-align: right;
            }
            a {
                text-decoration: none;
            }
            pre {
                background-color: #f9f9f9;
                border: 1px solid #ccc;
                padding: 5px;
                white-space: pre-wrap;
            }
        </style>
    </head>
    <body>
        <h1>Maven Repo Viewer</h1>
        <div style="float: left; width: 58%;">
            <h2 id="path">Index of /</h2>
            <div id="index"></div>
            <hr>
        </div>

        <div style="float: right; width: 40%;">
            <h2>Repository Selector</h2>
            <select id="repo_selector" onchange="switchRepository()">
                <option value="local">Local Repository</option>
                <option value="github_ptom76">GitHub Packages (PTOM76)</option>
            </select>

            <h2>Repository Info</h2>
            <h3>Gradle Kotlin</h3>
            <pre id="gradle_kotlin"></pre>

            <h3>Gradle Groovy</h3>
            <pre id="gradle_groovy"></pre>

            <h3>Maven</h3>
            <pre id="maven"></pre>
            
            <hr>
        </div>

        <script>
            var $dir = "";
            var currentRepo = "local";
            
            if (window.location.hash) {
                $dir = window.location.hash.substring(1);
                if (!$dir.endsWith("/")) {
                    window.location.hash = $dir + "/";
                }
            }
            
            window.onhashchange = () => {
                $dir = window.location.hash.substring(1);
                viewList($dir);
                viewRepo($dir);
            };

            function switchRepository() {
                const selector = document.getElementById("repo_selector");
                currentRepo = selector.value;
                
                // Reset directory and reload
                $dir = "";
                window.location.hash = "";
                viewList($dir);
                viewRepo($dir);
            }

            function formatDate(rawDate) {
                const date = new Date(rawDate);
                return date.toLocaleDateString() + " " + date.toLocaleTimeString();
            }

            function viewList(dir) {
                document.getElementById("index").innerHTML = "";

                const path = document.getElementById("path");
                
                if (currentRepo === "github_ptom76") {
                    path.innerHTML = "GitHub Packages (PTOM76) - Index of /" + dir;
                    viewGitHubPackagesList(dir);
                } else {
                    path.innerHTML = "Index of /" + dir;
                    
                    const paths = dir.split("/");
                    if (paths.length > 1) {
                        path.innerHTML = "<a href=''>Index of</a>" + " / " + paths.map((p, i) => {
                            if (i === paths.length - 2) {
                                return p;
                            }
                            return "<a href='#" + paths.slice(0, i + 1).join("/") + "/'>" + p + "</a>";
                        }).join(" / ");
                    }

                    fetch("../" + dir)
                        .then(response => response.text())
                        .then(text => {
                            const lines = text.split("\n");
                            const table = document.createElement("table");
                            for (const line of lines) {
                                const match = line.match(/<a href="([^"]+)">([^<]+)<\/a>\s+(\d{2}-\w{3}-\d{4} \d{2}:\d{2})/);
                                if (match) {
                                    const a = document.createElement("a");

                                    if (match[1].startsWith("./"))
                                        match[1] = match[1].replace("./", "");
                                    
                                    if (match[1].endsWith("/")) {
                                        a.href = "#" + dir + match[1];
                                    } else {
                                        a.href = "../" + dir + match[1];
                                    }
                                    a.textContent = match[2];
                                    const tr = document.createElement("tr");
                                    const td1 = document.createElement("td");
                                    td1.appendChild(a);
                                    tr.appendChild(td1);
                                    const td2 = document.createElement("td");
                                    td2.textContent = formatDate(match[3]);

                                    tr.appendChild(td2);
                                    table.appendChild(tr);
                                }
                            }
                            document.getElementById("index").appendChild(table);
                        })
                        .catch(error => {
                            document.getElementById("index").innerHTML = `<p style="color: red;">エラー: ${error.message}</p>`;
                        });
                }
            }

            function viewGitHubPackagesList(dir) {
                if (dir === "") {
                    // トップレベル: GitHub Packagesのリストを表示
                    fetch("/?do=ghpkglist&user=PTOM76")
                        .then(response => {
                            if (!response.ok) {
                                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                            }
                            return response.json();
                        })
                        .then(data => {
                            if (data.error) {
                                throw new Error(data.error);
                            }
                            
                            const table = document.createElement("table");
                            
                            data.packages.forEach(pkg => {
                                const a = document.createElement("a");
                                a.href = "#" + pkg.name + "/";
                                a.textContent = pkg.name;
                                
                                const tr = document.createElement("tr");
                                const td1 = document.createElement("td");
                                td1.appendChild(a);
                                tr.appendChild(td1);
                                
                                const td2 = document.createElement("td");
                                td2.textContent = formatDate(pkg.updated_at);
                                tr.appendChild(td2);
                                
                                table.appendChild(tr);
                            });
                            
                            document.getElementById("index").appendChild(table);
                        })
                        .catch(error => {
                            document.getElementById("index").innerHTML = `<p style="color: red;">GitHub Packagesの取得に失敗しました: ${error.message}</p>`;
                        });
                } else {
                    // 特定のパッケージ: バージョン一覧を表示
                    const packageName = dir.split("/")[0];
                    fetch(`/?do=ghpkginfo&user=PTOM76&package=${packageName}`)
                        .then(response => {
                            if (!response.ok) {
                                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                            }
                            return response.json();
                        })
                        .then(data => {
                            if (data.error) {
                                throw new Error(data.error);
                            }
                            
                            const table = document.createElement("table");
                            
                            data.versions.forEach(version => {
                                const a = document.createElement("a");
                                a.href = version.package_url || "#";
                                a.textContent = version.name;
                                
                                const tr = document.createElement("tr");
                                const td1 = document.createElement("td");
                                td1.appendChild(a);
                                tr.appendChild(td1);
                                
                                const td2 = document.createElement("td");
                                td2.textContent = formatDate(version.created_at);
                                tr.appendChild(td2);
                                
                                table.appendChild(tr);
                            });
                            
                            document.getElementById("index").appendChild(table);
                        })
                        .catch(error => {
                            document.getElementById("index").innerHTML = `<p style="color: red;">パッケージ情報の取得に失敗しました: ${error.message}</p>`;
                        });
                }
            }

            function viewRepo(dir) {
                const gradle_kotlin = document.getElementById("gradle_kotlin");
                const gradle_groovy = document.getElementById("gradle_groovy");
                const maven = document.getElementById("maven");

                gradle_kotlin.innerHTML = "";
                gradle_groovy.innerHTML = "";
                maven.innerHTML = "";

                if (currentRepo === "github_ptom76") {
                    // GitHub Packages用の設定を表示
                    if (!dir || dir === "") {
                        // リポジトリ設定を表示
                        gradle_kotlin.textContent = "repositories {\n" +
                            "    maven {\n" +
                            "        name = \"GitHubPackages\"\n" +
                            "        url = uri(\"https://maven.pkg.github.com/PTOM76/*\")\n" +
                            "        credentials {\n" +
                            "            username = project.findProperty(\"gpr.user\") ?: System.getenv(\"USERNAME\")\n" +
                            "            password = project.findProperty(\"gpr.key\") ?: System.getenv(\"TOKEN\")\n" +
                            "        }\n" +
                            "    }\n" +
                            "}";

                        gradle_groovy.textContent = "repositories {\n" +
                            "    maven {\n" +
                            "        name \"GitHubPackages\"\n" +
                            "        url \"https://maven.pkg.github.com/PTOM76/*\"\n" +
                            "        credentials {\n" +
                            "            username = project.findProperty(\"gpr.user\") ?: System.getenv(\"USERNAME\")\n" +
                            "            password = project.findProperty(\"gpr.key\") ?: System.getenv(\"TOKEN\")\n" +
                            "        }\n" +
                            "    }\n" +
                            "}";

                        maven.textContent = "<repository>\n" +
                            "    <id>github</id>\n" +
                            "    <name>GitHub PTOM76 Apache Maven Packages</name>\n" +
                            "    <url>https://maven.pkg.github.com/PTOM76/*</url>\n" +
                            "</repository>\n\n" +
                            "<!-- settings.xmlに認証情報を設定してください -->\n" +
                            "<server>\n" +
                            "    <id>github</id>\n" +
                            "    <username>YOUR_GITHUB_USERNAME</username>\n" +
                            "    <password>YOUR_GITHUB_TOKEN</password>\n" +
                            "</server>";
                    } else {
                        // 特定のパッケージの依存関係情報を表示
                        const packageName = dir.split("/")[0];
                        
                        fetch(`/?do=ghpkginfo&user=PTOM76&package=${packageName}`)
                            .then(response => response.json())
                            .then(data => {
                                if (data.package && data.latest_version) {
                                    const latestVersion = data.latest_version.name;
                                    gradle_kotlin.textContent = `implementation("ml.pkom:${packageName}:${latestVersion}")`;
                                    gradle_groovy.textContent = `implementation "ml.pkom:${packageName}:${latestVersion}"`;
                                    maven.textContent = `<dependency>\n    <groupId>ml.pkom</groupId>\n    <artifactId>${packageName}</artifactId>\n    <version>${latestVersion}</version>\n</dependency>`;
                                } else {
                                    gradle_kotlin.textContent = `implementation("ml.pkom:${packageName}:VERSION")`;
                                    gradle_groovy.textContent = `implementation "ml.pkom:${packageName}:VERSION"`;
                                    maven.textContent = `<dependency>\n    <groupId>ml.pkom</groupId>\n    <artifactId>${packageName}</artifactId>\n    <version>VERSION</version>\n</dependency>`;
                                }
                            })
                            .catch(error => {
                                gradle_kotlin.textContent = `implementation("ml.pkom:${packageName}:VERSION")`;
                                gradle_groovy.textContent = `implementation "ml.pkom:${packageName}:VERSION"`;
                                maven.textContent = `<dependency>\n    <groupId>ml.pkom</groupId>\n    <artifactId>${packageName}</artifactId>\n    <version>VERSION</version>\n</dependency>`;
                            });
                    }
                } else {
                    // ローカルリポジトリの処理
                    fetch("../" + dir)
                        .then(response => response.text())
                        .then(text => {
                            const lines = text.split("\n");

                            let pom = "";
                            for (const line of lines) {
                                if (line.includes("pom")) {
                                    const match = line.match(/<a href="\.\/([^"]+)">.+?\.pom<\/a>/);
                                    if (match) {
                                        pom = match[1];
                                        break;
                                    }
                                }
                            }
                            if (pom) {
                                fetch("../" + dir + pom)
                                    .then(response => response.text())
                                    .then(text => {
                                        const parser = new DOMParser();
                                        const doc = parser.parseFromString(text, "application/xml");
                                        const groupId = doc.querySelector("groupId").textContent;
                                        const artifactId = doc.querySelector("artifactId").textContent;
                                        const version = doc.querySelector("version").textContent;

                                        gradle_kotlin.textContent = `implementation("${groupId}:${artifactId}:${version}")`;
                                        gradle_groovy.textContent = `implementation "${groupId}:${artifactId}:${version}"`;
                                        maven.textContent = `<dependency>\n    <groupId>${groupId}</groupId>\n    <artifactId>${artifactId}</artifactId>\n    <version>${version}</version>\n</dependency>`;
                                    });
                            } else {
                                gradle_kotlin.textContent = "maven {\n" +
                                    "    name = \"PitanNET\"\n" +
                                    "    url = uri(\"https://maven.pitan76.net/\")\n" +
                                    "}\n";

                                gradle_groovy.textContent = "maven {\n" +
                                    "    name \"PitanNET\"\n" +
                                    "    url \"https://maven.pitan76.net/\"\n" +
                                    "}";
                                
                                maven.textContent = "<repository>\n" +
                                    "    <id>pitan-net</id>\n" +
                                    "    <name>PitanNET</name>\n" +
                                    "    <url>https://maven.pitan76.net/</url>\n" +
                                    "</repository>";
                            }
                        });
                }
            }

            fetch("../")
                .then(response => response.text())
                .then(text => {
                    viewList($dir);
                    viewRepo($dir);
                })
                .catch(error => {
                    // ローカルリポジトリが利用できない場合のフォールバック
                    console.log("Local repository not available, using GitHub Packages mode");
                });

        </script>

        <div style="clear: both;"></div>
        Raw: <a href="../">Index of /</a><br />
        Developer: <a href="https://pitan76.net/">Pitan</a>
    </body>
</html>
