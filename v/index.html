<!DOCTYPE html>
<html lang="ja">
    <head>
        <title>Maven Repo Viewer</title>
        <style>
            body {
                font-family: Arial, sans-serif;
            }
            table {
                background-color: #f9f9f9;
                border: 1px solid #ccc;
                border-collapse: collapse;
                padding: 5px;
                width: 100%;
            }
            th {
                text-align: left;
            }
            th, td {
                padding: 5px;
            }
            th:nth-child(2), td:nth-child(2) {
                text-align: right;
            }
            a {
                text-decoration: none;
            }
            pre {
                background-color: #f9f9f9;
                border: 1px solid #ccc;
                padding: 5px;

                white-space: pre-wrap;
            }
        </style>
    </head>
    <body>
        <h1>Maven Repo Viewer</h1>
        <div style="float: left; width: 58%;">
            <h2 id="path">Index of /</h2>
            <div id="index"></div>
            <hr>
        </div>

        <div style="float: right; width: 40%;">
            <h2>Repository Info</h2>
            <h3>Gradle Kotlin</h3>
            <pre id="gradle_kotlin"></pre>

            <h3>Gradle Groovy</h3>
            <pre id="gradle_groovy"></pre>

            <h3>Maven</h3>
            <pre id="maven"></pre>
            

            <hr>
        </div>

        <script>
            var $dir = "";
            if (window.location.hash) {
                $dir = window.location.hash.substring(1);
                if (!$dir.endsWith("/")) {
                    window.location.hash = $dir + "/";
                }
            }
            window.onhashchange = () => {
                $dir = window.location.hash.substring(1);
                viewList($dir);
                viewRepo($dir);
            };

            function formatDate(rawDate) {
                const date = new Date(rawDate);
                return date.toLocaleDateString() + " " + date.toLocaleTimeString();
            }

            function viewList(dir) {
                document.getElementById("index").innerHTML = "";

                const path = document.getElementById("path");
                path.innerHTML = "Index of /" + dir;
                
                const paths = dir.split("/");
                if (paths.length > 1) {
                    path.innerHTML = "<a href=''>Index of</a>" + " / " + paths.map((p, i) => {
                        if (i === paths.length - 2) {
                            return p;
                        }
                        return "<a href='#" + paths.slice(0, i + 1).join("/") + "/'>" + p + "</a>";
                    }).join(" / ");
                }

                // ローカルリポジトリとGitHub Packagesの両方を取得
                Promise.all([
                    fetch("../" + dir).then(response => response.ok ? response.text() : null).catch(() => null),
                    dir === "" ? fetch("/?do=ghpkglist&user=PTOM76").then(response => response.ok ? response.json() : null).catch(() => null) : Promise.resolve(null)
                ]).then(([localData, githubData]) => {
                    const table = document.createElement("table");
                    const allItems = [];
                    
                    // ローカルリポジトリのデータを処理
                    if (localData) {
                        const lines = localData.split("\n");
                        for (const line of lines) {
                            const match = line.match(/<a href="([^"]+)">([^<]+)<\/a>\s+(\d{2}-\w{3}-\d{4} \d{2}:\d{2})/);
                            if (match) {
                                let href = match[1];
                                if (href.startsWith("./"))
                                    href = href.replace("./", "");
                                
                                allItems.push({
                                    name: match[2],
                                    href: href.endsWith("/") ? "#" + dir + href : "../" + dir + href,
                                    date: match[3],
                                    isGitHub: false
                                });
                            }
                        }
                    }
                    
                    // GitHub Packagesのデータを処理（トップレベルの場合のみ）
                    if (githubData && !githubData.error && dir === "") {
                        githubData.packages.forEach(pkg => {
                            allItems.push({
                                name: pkg.name,
                                href: "#github-pkg/" + pkg.name + "/",
                                date: pkg.updated_at,
                                isGitHub: true
                            });
                        });
                    }
                    
                    // GitHub Packagesの特定パッケージを表示
                    if (dir.startsWith("github-pkg/")) {
                        const packageName = dir.replace("github-pkg/", "").replace("/", "");
                        fetch(`/?do=ghpkginfo&user=PTOM76&package=${packageName}`)
                            .then(response => response.json())
                            .then(data => {
                                if (data.versions) {
                                    data.versions.forEach(version => {
                                        const a = document.createElement("a");
                                        a.href = version.package_url || "#";
                                        a.textContent = version.name;
                                        
                                        const tr = document.createElement("tr");
                                        const td1 = document.createElement("td");
                                        td1.appendChild(a);
                                        tr.appendChild(td1);
                                        
                                        const td2 = document.createElement("td");
                                        td2.textContent = formatDate(version.created_at);
                                        tr.appendChild(td2);
                                        
                                        table.appendChild(tr);
                                    });
                                }
                            });
                    }
                    
                    // 名前でソートして統合表示
                    allItems.sort((a, b) => a.name.localeCompare(b.name));
                    
                    allItems.forEach(item => {
                        const a = document.createElement("a");
                        a.href = item.href;
                        a.textContent = item.name;
                        
                        const tr = document.createElement("tr");
                        const td1 = document.createElement("td");
                        td1.appendChild(a);
                        tr.appendChild(td1);
                        
                        const td2 = document.createElement("td");
                        td2.textContent = formatDate(item.date);
                        tr.appendChild(td2);
                        
                        table.appendChild(tr);
                    });
                    
                    document.getElementById("index").appendChild(table);
                });
            }

            function viewRepo(dir) {
                const gradle_kotlin = document.getElementById("gradle_kotlin");
                const gradle_groovy = document.getElementById("gradle_groovy");
                const maven = document.getElementById("maven");

                gradle_kotlin.innerHTML = "";
                gradle_groovy.innerHTML = "";
                maven.innerHTML = "";

                // GitHub Packagesの場合
                if (dir.startsWith("github-pkg/")) {
                    const packageName = dir.replace("github-pkg/", "").replace("/", "");
                    
                    if (packageName) {
                        fetch(`/?do=ghpkginfo&user=PTOM76&package=${packageName}`)
                            .then(response => response.json())
                            .then(data => {
                                if (data.package && data.latest_version) {
                                    const latestVersion = data.latest_version.name;
                                    // パッケージ名からgroupIdとartifactIdを推定
                                    const parts = packageName.split('.');
                                    const groupId = parts.slice(0, -1).join('.');
                                    const artifactId = parts[parts.length - 1];
                                    
                                    gradle_kotlin.textContent = `implementation("${groupId}:${artifactId}:${latestVersion}")`;
                                    gradle_groovy.textContent = `implementation "${groupId}:${artifactId}:${latestVersion}"`;
                                    maven.textContent = `<dependency>\n    <groupId>${groupId}</groupId>\n    <artifactId>${artifactId}</artifactId>\n    <version>${latestVersion}</version>\n</dependency>`;
                                } else {
                                    gradle_kotlin.textContent = `implementation("${packageName}:VERSION")`;
                                    gradle_groovy.textContent = `implementation "${packageName}:VERSION"`;
                                    maven.textContent = `<dependency>\n    <groupId>${packageName}</groupId>\n    <artifactId>ARTIFACT_ID</artifactId>\n    <version>VERSION</version>\n</dependency>`;
                                }
                            })
                            .catch(error => {
                                gradle_kotlin.textContent = `implementation("${packageName}:VERSION")`;
                                gradle_groovy.textContent = `implementation "${packageName}:VERSION"`;
                                maven.textContent = `<dependency>\n    <groupId>${packageName}</groupId>\n    <artifactId>ARTIFACT_ID</artifactId>\n    <version>VERSION</version>\n</dependency>`;
                            });
                    } else {
                        // GitHub Packages リポジトリ設定
                        gradle_kotlin.textContent = "repositories {\n" +
                            "    maven {\n" +
                            "        name = \"GitHubPackages\"\n" +
                            "        url = uri(\"https://maven.pkg.github.com/PTOM76/*\")\n" +
                            "    }\n" +
                            "}";

                        gradle_groovy.textContent = "repositories {\n" +
                            "    maven {\n" +
                            "        name \"GitHubPackages\"\n" +
                            "        url \"https://maven.pkg.github.com/PTOM76/*\"\n" +
                            "    }\n" +
                            "}";

                        maven.textContent = "<repository>\n" +
                            "    <id>github</id>\n" +
                            "    <name>GitHub PTOM76 Apache Maven Packages</name>\n" +
                            "    <url>https://maven.pkg.github.com/PTOM76/*</url>\n" +
                            "</repository>";
                    }
                    return;
                }

                // ローカルリポジトリの場合
                fetch("../" + dir)
                    .then(response => response.text())
                    .then(text => {
                        const lines = text.split("\n");

                        let pom = "";
                        for (const line of lines) {
                            if (line.includes("pom")) {
                                const match = line.match(/<a href="\.\/([^"]+)">.+?\.pom<\/a>/);
                                if (match) {
                                    pom = match[1];
                                    break;
                                }
                            }
                        }
                        if (pom) {
                            fetch("../" + dir + pom)
                                .then(response => response.text())
                                .then(text => {
                                    const parser = new DOMParser();
                                    const doc = parser.parseFromString(text, "application/xml");
                                    const groupId = doc.querySelector("groupId").textContent;
                                    const artifactId = doc.querySelector("artifactId").textContent;
                                    const version = doc.querySelector("version").textContent;

                                    gradle_kotlin.textContent = `implementation("${groupId}:${artifactId}:${version}")`;
                                    gradle_groovy.textContent = `implementation "${groupId}:${artifactId}:${version}"`;
                                    maven.textContent = `<dependency>\n    <groupId>${groupId}</groupId>\n    <artifactId>${artifactId}</artifactId>\n    <version>${version}</version>\n</dependency>`;
                                });
                        } else {
                            // 両方のリポジトリ設定を表示
                            gradle_kotlin.textContent = "repositories {\n" +
                                "    maven {\n" +
                                "        name = \"PitanNET\"\n" +
                                "        url = uri(\"https://maven.pitan76.net/\")\n" +
                                "    }\n";

                            gradle_groovy.textContent = "repositories {\n" +
                                "    maven {\n" +
                                "        name \"PitanNET\"\n" +
                                "        url \"https://maven.pitan76.net/\"\n" +
                                "    }\n";
                            
                            maven.textContent = "<repository>\n" +
                                "    <id>pitan-net</id>\n" +
                                "    <name>PitanNET</name>\n" +
                                "    <url>https://maven.pitan76.net/</url>\n" +
                                "</repository>";
                        }
                    })
                    .catch(error => {
                        // ローカルリポジトリが利用できない場合、GitHub Packagesの設定のみ表示
                        gradle_kotlin.textContent = "repositories {\n" +
                            "    maven {\n" +
                            "        name = \"GitHubPackages\"\n" +
                            "        url = uri(\"https://maven.pkg.github.com/PTOM76/*\")\n" +
                            "    }\n" +
                            "}";

                        gradle_groovy.textContent = "repositories {\n" +
                            "    maven {\n" +
                            "        name \"GitHubPackages\"\n" +
                            "        url \"https://maven.pkg.github.com/PTOM76/*\"\n" +
                            "    }\n" +
                            "}";

                        maven.textContent = "<repository>\n" +
                            "    <id>github</id>\n" +
                            "    <name>GitHub PTOM76 Apache Maven Packages</name>\n" +
                            "    <url>https://maven.pkg.github.com/PTOM76/*</url>\n" +
                            "</repository>";
                    });
            }

            fetch("../")
                .then(response => response.text())
                .then(text => {
                    viewList($dir);
                    viewRepo($dir);
                });

            

           
        </script>

        <div style="clear: both;"></div>
        Raw: <a href="../">Index of /</a><br />
        Developer: <a href="https://pitan76.net/">Pitan</a>
    </body>
</html>
